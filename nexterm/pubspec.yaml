name: nexterm
description: A full-featured SSH terminal client
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  dartssh2: ^2.14.0
  xterm: ^4.0.0
  dio: ^5.7.0
  connectivity_plus: ^6.1.2
  flutter_secure_storage: ^9.2.4
  pointycastle: ^3.9.1
  pinenacl: ^0.6.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  file_picker: ^11.0.2
  open_file: ^3.5.11
  mime: ^2.0.0
  local_auth: ^3.0.1
  share_plus: ^12.0.2
  flutter_markdown: ^0.7.7+1
  speech_to_text: ^7.0.0
  record: 5.1.0
  web_socket_channel: ^3.0.0
  crypto: ^3.0.6
  webdav_client: ^1.2.2
  smb_connect: ^0.0.9
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  flutter_local_notifications: ^18.0.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5
  fake_async: ^1.3.1

dependency_overrides:
  xterm:
    path: packages/xterm
  record_platform_interface: 1.1.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    - family: Source Code Pro
      fonts:
        - asset: assets/fonts/SourceCodePro-Medium.ttf
    - family: Fira Code
      fonts:
        - asset: assets/fonts/FiraCode-Regular.ttf
    - family: Ubuntu Mono
      fonts:
        - asset: assets/fonts/UbuntuMono-Regular.ttf
