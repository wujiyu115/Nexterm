name: nexterm
description: A full-featured SSH terminal client
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  dartssh2: ^2.14.0
  xterm: ^4.0.0
  dio: ^5.7.0
  connectivity_plus: ^6.1.2
  flutter_secure_storage: ^9.2.4
  pointycastle: ^3.9.1
  pinenacl: ^0.6.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  file_picker: ^11.0.2
  open_file: ^3.5.11
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5

flutter:
  uses-material-design: true
